<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Travelling Merchant</title>
  <link rel="stylesheet" href="/Frontend/Scripts/styles/main.css" />
  <style>

    /* ============
       Background
       ============ */
    .encounter-bg {
      position: fixed;
      inset: 0;
      background-image: url('/Frontend/public/background/background_2.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .encounter-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.1);
      z-index: 1;
    }

    /* ============
       Layout
       ============ */
    .encounter-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      font-family: 'Silkscreen', serif;
      color: #f0e6c8;
      overflow-y: auto;
      padding-bottom: 40px;
    }

    /* ============
       HUD
       ============ */
    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      background: rgba(0, 0, 0, 0.7);
      border-bottom: 2px solid #6b4f2a;
      font-size: 13px;
      box-sizing: border-box;
    }

    .hud-left, .hud-right {
      display: flex;
      gap: 20px;
    }

    .hud-item { color: #f0e6c8; }

    .hud-right {
      cursor: pointer;
      padding: 4px 8px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .hud-right:hover { border-color: #6b4f2a; }
    .hud-right.active { border-color: #c8963c; }

    .inv-label {
      font-size: 10px;
      color: #f0e6c8;
      letter-spacing: 1px;
      margin-right: 12px;
      font-weight: bold;
    }

    /* ============
       Encounter Card
       ============ */
    .trade-layout {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 16px;
    }
    
    .trade-col {
        flex: 1;
        max-width: 240px;
    }
    
    .trade-col-title {
        font-size: 10px;
        letter-spacing: 3px;
        color: #a88c5a;
        margin-bottom: 12px;
        text-align: center;
    }
    
    .trade-feedback {
        font-size: 10px;
        color: #a88c5a;
        margin-bottom: 12px;
        min-height: 16px;
        text-align: center;
    }
    
    .trade-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
    }

    .encounter-card {
      margin-top: 48px;
      width: 90%;
      max-width: 620px;
      background: rgba(10, 7, 3, 0.92);
      border: 2px solid #6b4f2a;
      padding: 32px;
      text-align: center;
    }

    .encounter-type {
      font-size: 10px;
      letter-spacing: 4px;
      color: #6b4f2a;
      margin-bottom: 12px;
    }

    .encounter-type.danger { color: #8b3a3a; }
    .encounter-type.water  { color: #3a6b8b; }

    .encounter-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .encounter-title {
      font-size: 22px;
      color: #f0e6c8;
      margin-bottom: 16px;
    }

    .encounter-desc {
      font-size: 11px;
      color: #a88c5a;
      line-height: 1.9;
      margin-bottom: 32px;
    }

    /* ============
       Choices
       ============ */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      padding: 14px 20px;
      font-family: 'Silkscreen', serif;
      font-size: 11px;
      color: #f0e6c8;
      background: rgba(20, 14, 6, 0.8);
      border: 1px solid #6b4f2a;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.6;
    }

    .choice-btn:hover {
      border-color: #c8963c;
      background: rgba(40, 28, 8, 0.9);
    }

    .choice-btn .choice-label {
      color: #c8963c;
      margin-right: 10px;
    }

    /* ============
       Outcome
       ============ */
    .outcome-box {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #6b4f2a;
      background: rgba(20, 14, 6, 0.9);
      font-size: 11px;
      color: #a88c5a;
      line-height: 1.9;
      text-align: center;
    }

    .outcome-box.visible { display: block; }
    .outcome-box.good { border-color: #3a6b3a; color: #7ec87e; }
    .outcome-box.bad  { border-color: #8b3a3a; color: #c87e7e; }

    .outcome-title {
      font-size: 13px;
      margin-bottom: 8px;
      color: #f0e6c8;
    }

    .continue-btn {
      margin-top: 20px;
      padding: 12px 36px;
      font-family: 'Silkscreen', serif;
      font-size: 13px;
      color: #1a1209;
      background-color: #c8963c;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .continue-btn:hover { background-color: #e0aa50; transform: scale(1.03); }

    /* ============
       Shared Panel Styles
       (offer, shop, minigame)
       ============ */
    .section-title {
      font-size: 13px;
      color: #a88c5a;
      letter-spacing: 3px;
      margin: 0 0 16px;
      text-align: center;
    }

    .cards-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .card {
      width: 140px;
      background: rgba(20, 14, 6, 0.85);
      border: 2px solid #6b4f2a;
      padding: 14px 10px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      text-align: center;
    }

    .card:hover { border-color: #c8963c; transform: translateY(-3px); }
    .card.selected { border-color: #e0aa50; background: rgba(40, 28, 8, 0.95); }
    .card.unaffordable { opacity: 0.4; cursor: not-allowed; }

    .card-name {
      font-size: 11px;
      color: #f0e6c8;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 9px;
      color: #a88c5a;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 10px;
      color: #c8963c;
    }

    .panel-confirm-btn {
      margin-top: 8px;
      padding: 12px 32px;
      font-family: 'Silkscreen', serif;
      font-size: 12px;
      color: #1a1209;
      background-color: #c8963c;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      opacity: 0.4;
      pointer-events: none;
    }

    .panel-confirm-btn.ready {
      opacity: 1;
      pointer-events: all;
    }

    .panel-confirm-btn.ready:hover { background-color: #e0aa50; }

    .panel-leave-btn {
      margin-top: 8px;
      padding: 12px 32px;
      font-family: 'Silkscreen', serif;
      font-size: 12px;
      color: #f0e6c8;
      background: transparent;
      border: 1px solid #6b4f2a;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .panel-leave-btn:hover {
      border-color: #c8963c;
      color: #c8963c;
    }

  </style>
</head>
<body>

  <div class="encounter-bg" id="encounter-bg"></div>
  <div class="encounter-overlay"></div>

  <div class="encounter-content">

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <span class="hud-item"><img src="/Frontend/public/sprites/money.png" class="hud-icon" alt="Gold"> <span id="hud-gold">0</span></span>
        <span class="hud-item"><img src="/Frontend/public/sprites/food.png" class="hud-icon" alt="Food"> <span id="hud-food">0</span></span>
      </div>
      <div class="hud-right" id="inv-trigger" title="Click to open inventory">
        <span class="inv-label">INVENTORY</span>
        <span class="hud-item">📦 <span id="hud-merch">0</span>/<span id="hud-merch-max">0</span></span>
        <span class="hud-item">🎒 <span id="hud-cons">0</span>/<span id="hud-cons-max">0</span></span>
        <span class="hud-item">💎 <span id="hud-relics">0</span>/<span id="hud-relics-max">0</span></span>
        <span class="inv-hint">▼</span>
      </div>
    </div>

    <!-- Inventory Panel -->
    <div id="inventory-panel">
      <div class="inv-tabs">
        <button class="inv-tab active" onclick="switchTab('merchandise', this)">📦 MERCH</button>
        <button class="inv-tab" onclick="switchTab('consumables', this)">🎒 CONSUMABLES</button>
        <button class="inv-tab" onclick="switchTab('relics', this)">💎 RELICS</button>
      </div>
      <div class="inv-grid" id="inv-grid"></div>
    </div>

    <!-- Encounter Card -->
    <div class="encounter-card">

      <!-- Encounter Info (hidden when a panel is active) -->
      <div id="enc-info">
        <div class="encounter-type" id="enc-type"></div>
        <div class="encounter-icon" id="enc-icon"></div>
        <div class="encounter-title" id="enc-title"></div>
        <div class="encounter-desc" id="enc-desc"></div>
        <div class="choices" id="enc-choices"></div>
        <div class="outcome-box" id="enc-outcome">
          <div class="outcome-title" id="outcome-title"></div>
          <div id="outcome-desc"></div>
          <button class="continue-btn" onclick="continueJourney()">CONTINUE →</button>
        </div>
      </div>

      <!-- Offer Panel (shown when pendingOffer is set) -->
      <div id="enc-offer" style="display:none"></div>

      <!-- Shop Panel (shown when pendingShop is set) -->
      <div id="enc-shop" style="display:none"></div>

      <!-- Minigame Panel (shown when pendingMinigame is set) -->
      <div id="enc-minigame" style="display:none"></div>
      
      <!-- Trade Panel (shown when pendingTrade is set) -->
      <div id="enc-trade" style="display:none"></div>

    </div>

  </div>

  <script type="module">

    // ============
    // Imports
    // ============
    import gameObject from '/Frontend/Scripts/gamelogic/GameLogic.js'
    import { ENCOUNTERS } from '/Frontend/Scripts/gamelogic/Encounters.js'
    import { RARITY_VALUES } from '/Frontend/Scripts/gamelogic/Cards.js'
    import { handleEncounter } from '/Frontend/Scripts/gamelogic/EncounterHandler.js'
    import { resolveItemValueComparison } from '/Frontend/Scripts/gamelogic/Minigames.js'
    import { initMusic } from '/Frontend/Scripts/components/audioManager.js'

    // ============
    // Music
    // ============
    initMusic()

    // ============
    // HUD
    // ============
    function updateHUD() {
      document.getElementById('hud-gold').textContent       = gameObject.player.gold
      document.getElementById('hud-food').textContent       = gameObject.player.food
      document.getElementById('hud-merch').textContent      = gameObject.player.merchandise.length
      document.getElementById('hud-merch-max').textContent  = gameObject.player.decks.merchandise
      document.getElementById('hud-cons').textContent       = gameObject.player.consumables.length
      document.getElementById('hud-cons-max').textContent   = gameObject.player.decks.consumables
      document.getElementById('hud-relics').textContent     = gameObject.player.relic.length
      document.getElementById('hud-relics-max').textContent = gameObject.player.decks.relics
    }

    // ============
    // Inventory
    // ============
    const panel  = document.getElementById('inventory-panel')
    const invBtn = document.getElementById('inv-trigger')
    let inventoryOpen = false
    let activeTab     = 'merchandise'

    invBtn.addEventListener('click', () => {
      inventoryOpen = !inventoryOpen
      panel.classList.toggle('open', inventoryOpen)
      invBtn.classList.toggle('active', inventoryOpen)
      if (inventoryOpen) renderInventory()
    })

    document.addEventListener('click', (e) => {
      if (inventoryOpen && !panel.contains(e.target) && !invBtn.contains(e.target)) {
        inventoryOpen = false
        panel.classList.remove('open')
        invBtn.classList.remove('active')
      }
    })

    window.switchTab = function (tab, el) {
      activeTab = tab
      document.querySelectorAll('.inv-tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      renderInventory()
    }

    function renderInventory() {
      const grid = document.getElementById('inv-grid')
      grid.innerHTML = ''

      let items = [], type = '', maxSlots = 0
      if (activeTab === 'merchandise') {
        items = gameObject.player.merchandise
        type = 'merchandise'
        maxSlots = gameObject.player.decks.merchandise
      } else if (activeTab === 'consumables') {
        items = gameObject.player.consumables
        type = 'consumable'
        maxSlots = gameObject.player.decks.consumables
      } else {
        items = gameObject.player.relic
        type = 'relic'
        maxSlots = gameObject.player.decks.relics
      }

      for (let i = 0; i < maxSlots; i++) {
        const card = items[i]
        const div = document.createElement('div')
        div.className = `inv-card ${type}`
        if (card) {
          div.innerHTML = `
            <div class="inv-card-icon">${card.icon ?? '📦'}</div>
            <div class="inv-card-name">${card.name}</div>
            <div class="inv-card-desc">${card.description ?? ''}</div>
            ${RARITY_VALUES[card.rarity] ? `<div class="inv-card-value">💰 ${RARITY_VALUES[card.rarity]}g</div>` : ''}
          `
        } else {
          div.classList.add('empty')
          div.innerHTML = `
            <div class="inv-card-icon">+</div>
            <div class="inv-card-name">Empty Slot</div>
          `
        }
        grid.appendChild(div)
      }
    }

    // ============
    // Subscriptions
    // ============
    gameObject.subscribe(updateHUD)
    gameObject.subscribe(() => { if (inventoryOpen) renderInventory() })
    gameObject.subscribe(state => {
      if (state.gameState.pendingOffer) {
          const el = document.getElementById('enc-offer')
          if (el.style.display === 'block' && el.innerHTML !== '') return
          renderOffer(state.gameState.pendingOffer)
      }
    })
    gameObject.subscribe(state => {
      if (state.gameState.pendingShop) {
          const el = document.getElementById('enc-shop')
          if (el.style.display === 'block' && el.innerHTML !== '') return
          renderShop(state.gameState.pendingShop)
      }
    })
    gameObject.subscribe(state => {
      if (state.gameState.pendingMinigame) {
          const el = document.getElementById('enc-minigame')
          if (el.style.display === 'block' && el.innerHTML !== '') return
          renderMinigame(state.gameState.pendingMinigame)
      }
    })
    gameObject.subscribe(state => { if (state.gameState.pendingTrade) renderTrade(state.gameState.pendingTrade) })

    // ============
    // Helpers
    // ============
    function showPanel(panelId) {
      document.getElementById('enc-info').style.display    = 'none'
      document.getElementById('enc-offer').style.display   = 'none'
      document.getElementById('enc-shop').style.display    = 'none'
      document.getElementById('enc-minigame').style.display = 'none'
      document.getElementById(panelId).style.display = 'block'
    }

    function closePanel() {
      document.getElementById('enc-offer').style.display    = 'none'
      document.getElementById('enc-shop').style.display     = 'none'
      document.getElementById('enc-minigame').style.display = 'none'
      document.getElementById('enc-info').style.display     = 'block'
    }

    // ============
    // Encounter Rendering
    // ============
    const currentEncounterId = gameObject.gameState.currentLeg.eventQueue[0]
    const encounter = ENCOUNTERS[currentEncounterId]

    console.log('queue:', gameObject.gameState.currentLeg.eventQueue)
    console.log('currentEncounterId:', currentEncounterId)
    console.log('encounter:', encounter)

    document.getElementById('encounter-bg').style.backgroundImage = `url('${encounter.bg ?? ''}')`

    const encType = document.getElementById('enc-type')
    encType.textContent = encounter.displayType ?? ''
    encType.className   = `encounter-type ${encounter.typeClass ?? ''}`
    document.getElementById('enc-icon').textContent  = encounter.icon ?? ''
    document.getElementById('enc-title').textContent = encounter.title ?? ''
    document.getElementById('enc-desc').textContent  = encounter.description ?? ''

    const choicesEl = document.getElementById('enc-choices')
    encounter.options.forEach((option, index) => {
      const btn = document.createElement('button')
      btn.className = 'choice-btn'
      btn.innerHTML = `<span class="choice-label">${String.fromCharCode(65 + index)}.</span>${option.label}`
      btn.addEventListener('click', () => resolveChoice(option, index, btn))
      choicesEl.appendChild(btn)
    })

    function renderTrade(trade) {
      showPanel('enc-trade')
      const el = document.getElementById('enc-trade')
  
      const RARITY_ORDER = ["common", "uncommon", "rare", "epic", "legendary", "mythic"]
  
      function rarityRank(rarity) {
          return RARITY_ORDER.indexOf(rarity)
      }
  
      function purchasingPower(card) {
          return rarityRank(card.rarity) + (card.category === trade.traderCategory ? 1 : 0)
      }
  
      function canAfford(playerCard, traderCard) {
          return purchasingPower(playerCard) >= rarityRank(traderCard.rarity)
      }
  
      let selectedTraderCard = null
      let selectedPlayerCard = null
  
      function render() {
          el.innerHTML = `
              <div class="section-title">TRADE</div>
              <div class="trade-layout">
                  <div class="trade-col">
                      <div class="trade-col-title">THEIR GOODS</div>
                      <div id="trader-cards"></div>
                  </div>
                  <div class="trade-col">
                      <div class="trade-col-title">YOUR GOODS</div>
                      <div id="player-cards"></div>
                  </div>
              </div>
              <div id="trade-feedback" class="trade-feedback"></div>
              <div class="trade-actions">
                  <button class="panel-confirm-btn" id="trade-confirm" onclick="confirmTrade()">TRADE</button>
                  <button class="panel-leave-btn" onclick="closeTrade()">LEAVE</button>
              </div>
          `
  
          renderTraderCards()
          renderPlayerCards()
      }
  
      function renderTraderCards() {
          const container = document.getElementById('trader-cards')
          container.innerHTML = ''
  
          trade.traderInventory
              .filter(card => !trade.tradedTraderIds.includes(card.id))
              .forEach(card => {
                  const div = document.createElement('div')
                  const isSelected = selectedTraderCard?.id === card.id
                  div.className = `card ${isSelected ? 'selected' : ''}`
                  div.innerHTML = `
                      <div class="card-name">${card.name}</div>
                      <div class="card-desc">${card.description}</div>
                      <div class="card-value">${card.rarity}</div>
                  `
                  div.addEventListener('click', () => {
                      selectedTraderCard = isSelected ? null : card
                      updateFeedback()
                      renderTraderCards()
                      renderPlayerCards()
                  })
                  container.appendChild(div)
              })
      }
  
      function renderPlayerCards() {
          const container = document.getElementById('player-cards')
          container.innerHTML = ''
  
          gameObject.player.merchandise
              .filter(card => !trade.tradedPlayerIds.includes(card.id))
              .forEach(card => {
                  const isSelected = selectedPlayerCard?.id === card.id
                  const isValid = selectedTraderCard ? canAfford(card, selectedTraderCard) : true
                  const div = document.createElement('div')
                  div.className = `card ${isSelected ? 'selected' : ''} ${!isValid ? 'unaffordable' : ''}`
                  div.innerHTML = `
                      <div class="card-name">${card.name}</div>
                      <div class="card-desc">${card.description}</div>
                      <div class="card-value">${card.rarity}${card.category === trade.traderCategory ? ' ★' : ''}</div>
                  `
                  div.addEventListener('click', () => {
                      if (!isValid) return
                      selectedPlayerCard = isSelected ? null : card
                      updateFeedback()
                      renderPlayerCards()
                      const btn = document.getElementById('trade-confirm')
                      if (btn) btn.classList.toggle('ready', !!(selectedTraderCard && selectedPlayerCard))
                  })
                  container.appendChild(div)
              })
      }
  
      function updateFeedback() {
          const fb = document.getElementById('trade-feedback')
          if (!fb) return
          if (!selectedTraderCard) {
              fb.textContent = 'Select an item from their inventory.'
              return
          }
          if (!selectedPlayerCard) {
              fb.textContent = `You need ${selectedTraderCard.rarity} purchasing power. Category match gives +1.`
              return
          }
          if (canAfford(selectedPlayerCard, selectedTraderCard)) {
              fb.textContent = `Trade is valid. ${selectedPlayerCard.name} → ${selectedTraderCard.name}`
          } else {
              fb.textContent = `Not enough purchasing power for ${selectedTraderCard.name}.`
          }
      }
  
      window.confirmTrade = function () {
        if (!selectedTraderCard || !selectedPlayerCard) return
        if (!canAfford(selectedPlayerCard, selectedTraderCard)) return

        // check inventory space before committing
        if (gameObject.player.merchandise.length >= gameObject.player.decks.merchandise) {
            document.getElementById('trade-feedback').textContent = 'Inventory full — sell something first.'
            return
        }

        gameObject.removeMerchandise(selectedPlayerCard.id)
        gameObject.addMerchandise(selectedTraderCard.id)

        trade.tradedTraderIds.push(selectedTraderCard.id)
        trade.tradedPlayerIds.push(selectedPlayerCard.id)

        selectedTraderCard = null
        selectedPlayerCard = null
        render()
      }
  
      window.closeTrade = function () {
          gameObject.gameState.pendingTrade = null
          gameObject.resolveEncounter()
          gameObject._notify()
          continueJourney()
      }
  
      render()
  }

    // ============
    // Choice Resolution
    // ============
    function resolveChoice(option, index, btn) {
      document.querySelectorAll('.choice-btn').forEach(b => {
        b.style.pointerEvents = 'none'
        b.style.opacity = '0.4'
      })
      btn.style.opacity = '1'
      btn.style.borderColor = '#c8963c'

      const result = handleEncounter(currentEncounterId, index, gameObject)
      if (!result) return

      // if a panel was opened by the effect, subscription handles rendering
      // only show outcome box for simple results with no pending panel
      const hasPending = gameObject.gameState.pendingOffer
        || gameObject.gameState.pendingShop
        || gameObject.gameState.pendingMinigame

      if (!hasPending) {
        const box = document.getElementById('enc-outcome')
        box.className = 'outcome-box visible'
        document.getElementById('outcome-title').textContent = 'Outcome'
        document.getElementById('outcome-desc').textContent  = result.description
      }
    }

    // ============
    // Offer Panel
    // ============
    function renderOffer(offer) {
      showPanel('enc-offer')
      const offerEl = document.getElementById('enc-offer')
      offerEl.innerHTML = `
        <div class="section-title">CHOOSE ${offer.pick} ITEM${offer.pick > 1 ? 'S' : ''}</div>
        <div class="cards-row" id="offer-cards"></div>
        <button class="panel-confirm-btn" id="offer-confirm" onclick="confirmOffer()">CONFIRM</button>
      `

      const container = document.getElementById('offer-cards')
      let selected = []

      offer.candidates.forEach(card => {
        const div = document.createElement('div')
        div.className = 'card'
        div.innerHTML = `
          <div class="card-name">${card.name}</div>
          <div class="card-desc">${card.description}</div>
          <div class="card-value">${card.rarity}</div>
        `
        div.addEventListener('click', () => {
          if (selected.includes(card.id)) {
            selected = selected.filter(id => id !== card.id)
            div.classList.remove('selected')
          } else if (selected.length < offer.pick) {
            selected.push(card.id)
            div.classList.add('selected')
          }
          const btn = document.getElementById('offer-confirm')
          btn.classList.toggle('ready', selected.length === offer.pick)
        })
        container.appendChild(div)
      })

      window.confirmOffer = function () {
        const offer = gameObject.gameState.pendingOffer
        selected.forEach(id => {
          if (offer.offerType === 'relic') {
            gameObject.addRelic(id)
          } else {
            gameObject.addMerchandise(id)
          }
        })
        gameObject.gameState.pendingOffer = null
        gameObject.resolveEncounter()
        gameObject._notify()
        continueJourney()
      }
    }

    // ============
    // Shop Panel
    // ============
    function renderShop(shop) {
      showPanel('enc-shop')
      const shopEl = document.getElementById('enc-shop')
      const hasCurseInflation = gameObject.player.relic.some(r => r.effect === 'curse_inflation')

      shopEl.innerHTML = `
        <div class="section-title">ROADSIDE SHOP</div>
        <div class="cards-row" id="shop-cards"></div>
        <button class="panel-leave-btn" onclick="closeShop()">LEAVE SHOP</button>
      `

      const container = document.getElementById('shop-cards')

      shop.items.forEach(card => {
        const basePrice = Math.ceil(RARITY_VALUES[card.rarity] * shop.markup)
        const price = hasCurseInflation ? Math.ceil(basePrice * 1.25) : basePrice
        const playerResource = shop.currency === 'gold'
          ? gameObject.player.gold
          : gameObject.player.food
        const canAfford = playerResource >= price

        const div = document.createElement('div')
        div.className = `card ${canAfford ? '' : 'unaffordable'}`
        div.innerHTML = `
          <div class="card-name">${card.name}</div>
          <div class="card-desc">${card.description}</div>
          <div class="card-value">${price} ${shop.currency === 'gold' ? '💰' : '🍞'}</div>
        `
        if (canAfford) {
          div.addEventListener('click', () => buyItem(card, price, shop.currency, div))
        }
        container.appendChild(div)
      })
    }

    function buyItem(card, price, currency, div) {
      if (currency === 'gold') {
        gameObject.spendGold(price)
      } else {
        gameObject.spendFood(price)
      }
      gameObject.addMerchandise(card.id)
      div.classList.add('selected')
      div.style.pointerEvents = 'none'
    }

    window.closeShop = function () {
      gameObject.gameState.pendingShop = null
      gameObject.resolveEncounter()
      gameObject._notify()
      continueJourney()
    }

    // ============
    // Minigame Panel
    // ============
    function renderMinigame(minigame) {
      console.log('renderMinigame called, phase:', minigame.phase)
      showPanel('enc-minigame')
      const el = document.getElementById('enc-minigame')
      console.log('enc-minigame el:', el)
      if (minigame.phase === 'pick') {
        renderMinigamePick(minigame, el)
      } else if (minigame.phase === 'result') {
        renderMinigameResult(minigame, el)
      }
    }

    function renderMinigamePick(minigame, el) {
      const merchandise = gameObject.player.merchandise
      console.log('renderMinigamePick, merchandise:', merchandise)
      console.log('el.innerHTML before:', el.innerHTML)

      // check before rendering anything
      if (merchandise.length === 0) {
          el.innerHTML = `
              <div class="section-title">NOTHING TO WAGER</div>
              <div class="encounter-desc">You have no merchandise to offer the trader.</div>
              <button class="panel-confirm-btn ready" onclick="closeMinigameEmpty()">LEAVE</button>
          `
          window.closeMinigameEmpty = function () {
              gameObject.gameState.pendingMinigame = null
              gameObject.resolveEncounter()
              gameObject._notify()
              continueJourney()
          }
          return
      }

      // rest of existing render code
      el.innerHTML = `...`
    }

    function renderMinigameResult(minigame, el) {
      const { outcome, traderCard } = minigame
      el.innerHTML = `
        <div class="section-title">${outcome.title}</div>
        <div class="encounter-desc">${outcome.description}</div>
        <div class="cards-row">
          <div class="card">
            <div class="card-name">Trader's Card</div>
            <div class="card-name">${traderCard.name}</div>
            <div class="card-value">${traderCard.rarity}</div>
          </div>
          ${outcome.reward ? `
          <div class="card selected">
            <div class="card-name">Your Reward</div>
            <div class="card-name">${outcome.reward.name}</div>
            <div class="card-value">${outcome.reward.rarity}</div>
          </div>` : ''}
        </div>
        <button class="panel-confirm-btn ready" onclick="closeMinigame()">CONTINUE →</button>
      `

      window.closeMinigame = function () {
        gameObject.gameState.pendingMinigame = null
        gameObject.resolveEncounter()
        gameObject._notify()
        continueJourney()
      }
    }

    // ============
    // Navigation
    // ============
    window.continueJourney = function () {
      if (gameObject.gameState.phase === 'checkpoint') {
        window.location.href = '/Frontend/Scripts/pages/checkpoint.html'
      } else if (gameObject.gameState.phase === 'win') {
        window.location.href = '/Frontend/Scripts/pages/win.html'
      } else if (gameObject.gameState.phase === 'lose') {
        window.location.href = '/Frontend/Scripts/pages/lose.html'
      } else {
        window.location.href = '/Frontend/Scripts/pages/encounter.html'
      }
    }

    // ============
    // Init
    // ============
    updateHUD()

  </script>

</body>
</html>
