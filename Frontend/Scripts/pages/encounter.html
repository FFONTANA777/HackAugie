<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Travelling Merchant</title>
  <link rel="stylesheet" href="/Frontend/Scripts/styles/main.css" />
  <style>

    /* ============
       Background
       ============ */
    .encounter-bg {
      position: fixed;
      inset: 0;
      background-image: url('/Frontend/public/background/background_2.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .encounter-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.1);
      z-index: 1;
    }

    /* ============
       Layout
       ============ */
    .encounter-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      font-family: 'Silkscreen', serif;
      color: #f0e6c8;
      overflow-y: auto;
      padding-bottom: 40px;
    }

    /* ============
       HUD
       ============ */
    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      background: rgba(0, 0, 0, 0.7);
      border-bottom: 2px solid #6b4f2a;
      font-size: 13px;
      box-sizing: border-box;
    }

    .hud-left, .hud-right {
      display: flex;
      gap: 20px;
    }
    .hud-item { color: #f0e6c8; }

    .hud-right {
      cursor: pointer;
      padding: 4px 8px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .hud-right:hover {
      border-color: #6b4f2a;
    }

    .hud-right.active {
      border-color: #c8963c;
    }

    /* ============
       Encounter Card
       ============ */
    .encounter-card {
      margin-top: 48px;
      width: 90%;
      max-width: 620px;
      background: rgba(10, 7, 3, 0.92);
      border: 2px solid #6b4f2a;
      padding: 32px;
      text-align: center;
    }

    .encounter-type {
      font-size: 10px;
      letter-spacing: 4px;
      color: #6b4f2a;
      margin-bottom: 12px;
    }

    .encounter-type.danger { color: #8b3a3a; }
    .encounter-type.water  { color: #3a6b8b; }

    .encounter-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .encounter-title {
      font-size: 22px;
      color: #f0e6c8;
      margin-bottom: 16px;
    }

    .encounter-desc {
      font-size: 11px;
      color: #a88c5a;
      line-height: 1.9;
      margin-bottom: 32px;
    }

    /* ============
       Choices
       ============ */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      padding: 14px 20px;
      font-family: 'Silkscreen', serif;
      font-size: 11px;
      color: #f0e6c8;
      background: rgba(20, 14, 6, 0.8);
      border: 1px solid #6b4f2a;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.6;
    }

    .choice-btn:hover {
      border-color: #c8963c;
      background: rgba(40, 28, 8, 0.9);
    }

    .choice-btn .choice-label {
      color: #c8963c;
      margin-right: 10px;
    }

    /* ============
       Outcome
       ============ */
    .outcome-box {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #6b4f2a;
      background: rgba(20, 14, 6, 0.9);
      font-size: 11px;
      color: #a88c5a;
      line-height: 1.9;
      text-align: center;
    }

    .outcome-box.visible { display: block; }

    .outcome-box.good { border-color: #3a6b3a; color: #7ec87e; }
    .outcome-box.bad  { border-color: #8b3a3a; color: #c87e7e; }

    .outcome-title {
      font-size: 13px;
      margin-bottom: 8px;
      color: #f0e6c8;
    }

    .continue-btn {
      margin-top: 20px;
      padding: 12px 36px;
      font-family: 'Silkscreen', serif;
      font-size: 13px;
      color: #1a1209;
      background-color: #c8963c;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .continue-btn:hover { background-color: #e0aa50; transform: scale(1.03); }

    .inv-label {
      font-size: 10px;
      color: #f0e6c8;
      letter-spacing: 1px;
      margin-right: 12px;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <div class="encounter-bg" id="encounter-bg"></div>
  <div class="encounter-overlay"></div>

  <div class="encounter-content">

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <span class="hud-item">💰 <span id="hud-gold">0</span></span>
        <span class="hud-item">🍞 <span id="hud-food">0</span></span>
      </div>
      <div class="hud-right" id="inv-trigger" title="Click to open inventory">
        <span class="inv-label">INVENTORY</span>
        <span class="hud-item">📦 <span id="hud-merch">0</span>/<span id="hud-merch-max">0</span></span>
        <span class="hud-item">🎒 <span id="hud-cons">0</span>/<span id="hud-cons-max">0</span></span>
        <span class="hud-item">💎 <span id="hud-relics">0</span>/<span id="hud-relics-max">0</span></span>
        <span class="inv-hint">▼</span>
      </div>
    </div>

    <!-- Inventory Panel -->
    <div id="inventory-panel">
      <div class="inv-tabs">
        <button class="inv-tab active" onclick="switchTab('merchandise', this)">📦 MERCH</button>
        <button class="inv-tab" onclick="switchTab('consumables', this)">🎒 CONSUMABLES</button>
        <button class="inv-tab" onclick="switchTab('relics', this)">💎 RELICS</button>
      </div>
      <div class="inv-grid" id="inv-grid"></div>
    </div>

    <!-- Encounter Card -->
    <div class="encounter-card">
      <div class="encounter-type" id="enc-type"></div>
      <div class="encounter-icon" id="enc-icon"></div>
      <div class="encounter-title" id="enc-title"></div>
      <div class="encounter-desc" id="enc-desc"></div>
      <div class="choices" id="enc-choices"></div>
      <div class="outcome-box" id="enc-outcome">
        <div class="outcome-title" id="outcome-title"></div>
        <div id="outcome-desc"></div>
        <button class="continue-btn" onclick="continueJourney()">CONTINUE →</button>
      </div>
    </div>

  </div>

  <audio id="bg-music" loop>
    <source src="/Frontend/public/sounds/medieval-folk-music.mp3" type="audio/mpeg" />
  </audio>

  <script type="module">
    import gameObject from '/Frontend/Scripts/gamelogic/GameLogic.js'

    // ============
    // Music
    // ============
    const music = document.getElementById('bg-music')
    document.addEventListener('click', () => music.play(), { once: true })

    // ============
    // HUD
    // ============
    function updateHUD() {
      document.getElementById('hud-gold').textContent       = gameObject.player.gold
      document.getElementById('hud-food').textContent       = gameObject.player.food
      document.getElementById('hud-merch').textContent      = gameObject.player.merchandise.length
      document.getElementById('hud-merch-max').textContent  = gameObject.player.decks.merchandise
      document.getElementById('hud-cons').textContent       = gameObject.player.consumables.length
      document.getElementById('hud-cons-max').textContent   = gameObject.player.decks.consumables
      document.getElementById('hud-relics').textContent     = gameObject.player.relic.length
      document.getElementById('hud-relics-max').textContent = gameObject.player.decks.relics
    }
    gameObject.subscribe(updateHUD)
    updateHUD()

    // ============
    // Inventory
    // ============
    const panel  = document.getElementById('inventory-panel')
    const invBtn = document.getElementById('inv-trigger')
    let inventoryOpen = false
    let activeTab     = 'merchandise'

    invBtn.addEventListener('click', () => {
      inventoryOpen = !inventoryOpen
      panel.classList.toggle('open', inventoryOpen)
      invBtn.classList.toggle('active', inventoryOpen)
      if (inventoryOpen) renderInventory()
    })

    document.addEventListener('click', (e) => {
      if (inventoryOpen && !panel.contains(e.target) && !invBtn.contains(e.target)) {
        inventoryOpen = false
        panel.classList.remove('open')
        invBtn.classList.remove('active')
      }
    })

    window.switchTab = function (tab, el) {
      activeTab = tab
      document.querySelectorAll('.inv-tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      renderInventory()
    }

    function renderInventory() {
      const grid = document.getElementById('inv-grid')
      grid.innerHTML = ''
      const tabMap = {
        merchandise: { items: gameObject.player.merchandise, type: 'merchandise' },
        consumables: { items: gameObject.player.consumables, type: 'consumable'  },
        relics:      { items: gameObject.player.relic,        type: 'relic'       },
      }
      const { items, type } = tabMap[activeTab]
      if (items.length === 0) {
        grid.innerHTML = `<div class="inv-empty">nothing here yet</div>`
        return
      }
      items.forEach(card => {
        const div = document.createElement('div')
        div.className = `inv-card ${type}`
        div.innerHTML = `
          <div class="inv-card-icon">${card.icon ?? '📦'}</div>
          <div class="inv-card-name">${card.name}</div>
          <div class="inv-card-desc">${card.description ?? ''}</div>
          ${card.value ? `<div class="inv-card-value">💰 ${card.value}g</div>` : ''}
        `
        grid.appendChild(div)
      })
    }

    gameObject.subscribe(() => { if (inventoryOpen) renderInventory() })

    // ============
    // Encounters
    // ============
    const ENCOUNTERS = {
      bandit: {
        type: 'AMBUSH',
        typeClass: 'danger',
        icon: '⚔️',
        title: 'Bandits on the Road',
        desc: 'A group of armed bandits steps out from the treeline, blocking your path. They eye your wagon greedily.',
        bg: '/Frontend/public/backgrounds/bandit.png',
        choices: [
          {
            label: 'A',
            text: 'Pay them off — hand over 30 gold to pass safely.',
            outcome: {
              type: 'bad',
              title: 'Toll Paid',
              desc: 'You hand over the gold. They let you pass without further trouble.',
              apply: () => gameObject.spendGold(30)
            }
          },
          {
            label: 'B',
            text: 'Try to outrun them — risky, but keeps your gold.',
            outcome: {
              type: Math.random() > 0.5 ? 'good' : 'bad',
              title: Math.random() > 0.5 ? 'Escaped!' : 'Caught!',
              desc: Math.random() > 0.5
                ? 'Your horse is fast. You leave the bandits in the dust.'
                : 'They catch up and rough you up, stealing 50 gold and some food.',
              apply: () => {
                if (Math.random() > 0.5) return
                gameObject.spendGold(50)
                gameObject.spendFood(3)
              }
            }
          },
          {
            label: 'C',
            text: 'Talk your way out — use your merchant charm.',
            outcome: {
              type: 'good',
              title: 'Silver Tongue',
              desc: 'You spin a tale of poverty and plague. The bandits leave you alone, oddly convinced.',
              apply: () => {}
            }
          },
        ]
      },

      river: {
        type: 'HAZARD',
        typeClass: 'water',
        icon: '🌊',
        title: 'Flooded River Crossing',
        desc: 'The river ahead has burst its banks after recent rains. The crossing looks treacherous.',
        bg: '/Frontend/public/background/background_river.png',
        choices: [
          {
            label: 'A',
            text: 'Ford the river — push through and hope for the best.',
            outcome: {
              type: 'bad',
              title: 'Rough Crossing',
              desc: 'You make it across but the cold water soaks your supplies. You lose 4 food.',
              apply: () => gameObject.spendFood(4)
            }
          },
          {
            label: 'B',
            text: 'Find a safer crossing upstream — costs extra time and food.',
            outcome: {
              type: 'bad',
              title: 'Long Detour',
              desc: 'The detour takes hours. You cross safely but burn through 2 food.',
              apply: () => gameObject.spendFood(2)
            }
          },
          {
            label: 'C',
            text: 'Pay a local ferryman 20 gold to take you across.',
            outcome: {
              type: 'good',
              title: 'Safe Passage',
              desc: 'The ferryman knows every current. You cross without losing anything.',
              apply: () => gameObject.spendGold(20)
            }
          },
        ]
      }
    }

    // ============
    // Pick & Render Encounter
    // ============
    const keys       = Object.keys(ENCOUNTERS)
    const randomKey  = keys[Math.floor(Math.random() * keys.length)]
    const encounter  = ENCOUNTERS[randomKey]

    // set background
    document.getElementById('encounter-bg').style.backgroundImage =
      `url('${encounter.bg}')`

    // populate card
    const encType = document.getElementById('enc-type')
    encType.textContent = encounter.type
    encType.className   = `encounter-type ${encounter.typeClass}`
    document.getElementById('enc-icon').textContent  = encounter.icon
    document.getElementById('enc-title').textContent = encounter.title
    document.getElementById('enc-desc').textContent  = encounter.desc

    // render choices
    const choicesEl = document.getElementById('enc-choices')
    encounter.choices.forEach(choice => {
      const btn = document.createElement('button')
      btn.className = 'choice-btn'
      btn.innerHTML = `<span class="choice-label">${choice.label}.</span>${choice.text}`
      btn.addEventListener('click', () => resolveChoice(choice, btn))
      choicesEl.appendChild(btn)
    })

    // ============
    // Resolve Choice
    // ============
    function resolveChoice(choice, btn) {
      // lock all buttons
      document.querySelectorAll('.choice-btn').forEach(b => {
        b.style.pointerEvents = 'none'
        b.style.opacity = '0.4'
      })
      btn.style.opacity = '1'
      btn.style.borderColor = '#c8963c'

      // evaluate outcome (re-roll random outcomes)
      const isBadRun = Math.random() > 0.5
      let outcome = choice.outcome

      // for choices with dynamic outcomes recalculate here
      if (randomKey === 'bandit' && choice.label === 'B') {
        outcome = isBadRun
          ? { type: 'bad',  title: 'Caught!',   desc: 'They catch up and steal 50 gold and some food.', apply: () => { gameObject.spendGold(50); gameObject.spendFood(3) } }
          : { type: 'good', title: 'Escaped!',  desc: 'Your horse is fast. You leave the bandits behind.', apply: () => {} }
      }

      // apply effect
      outcome.apply()
      updateHUD()

      // show outcome
      const box = document.getElementById('enc-outcome')
      box.className = `outcome-box visible ${outcome.type}`
      document.getElementById('outcome-title').textContent = outcome.title
      document.getElementById('outcome-desc').textContent  = outcome.desc
    }

    // ============
    // Continue
    // ============
    window.continueJourney = function () {
      window.location.href = '/Frontend/Scripts/pages/encounter.html'
      // later: check if next stop is town → redirect to checkpoint.html
    }

  </script>

</body>
</html>
