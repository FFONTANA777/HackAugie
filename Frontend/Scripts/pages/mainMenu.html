<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Travelling Merchant</title>
  <link rel="stylesheet" href="/Frontend/Scripts/styles/main.css" />
  <style>
    .menu-bg {
      position: fixed;
      inset: 0;
      background-image: url('/Frontend/public/background/background_2.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    .menu-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      font-family: 'Silkscreen', serif;
    }

    .menu-title {
      font-size: 48px;
      color: #f0e6c8;
      text-shadow: 4px 4px 0px #3a2a0a;
      text-align: center;
      line-height: 1.3;
    }

    .menu-subtitle {
      font-size: 14px;
      color: #a88c5a;
      letter-spacing: 4px;
    }

    .menu-btn {
      margin-top: 16px;
      padding: 14px 40px;
      font-family: 'Silkscreen', serif;
      font-size: 18px;
      color: #1a1209;
      background-color: #c8963c;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .menu-btn:hover {
      background-color: #e0aa50;
      transform: scale(1.04);
    }

    .menu-btn:active {
      transform: scale(0.97);
    }

    .highscore-box {
      margin-top: 8px;
      font-size: 13px;
      color: #a88c5a;
      text-align: center;
    }

    .highscore-box span {
      color: #f0e6c8;
    }
  </style>
</head>
<body>

  <div class="menu-bg"></div>
  <div class="menu-overlay"></div>

  <div class="menu-content">
    <div class="menu-title">The Travelling<br/>Merchant</div>
    <div class="menu-subtitle">a journey of risk & reward</div>

    <button class="menu-btn" onclick="startGame()">START JOURNEY</button>

    <div class="highscore-box">
      BEST RUN: <span id="highscore-display">0</span> gold
    </div>
  </div>

  <audio id="bg-music" loop>
    <source src="/Frontend/public/sounds/medieval-folk-music.mp3" type="audio/mpeg" />
  </audio>

  <script type="module">
    import gameObject from '/Frontend/Scripts/gameLogic/GameLogic.js'

    const music = document.getElementById('bg-music')
    document.addEventListener('click', () => {
    music.play()
    }, { once: true })

    const saved = localStorage.getItem('highscore')
    if (saved) {
    document.getElementById('highscore-display').textContent = saved
    }

    window.startGame = function () {
    music.pause()
    window.location.href = '/Frontend/Scripts/pages/gameBoard.html'
    }
  </script>

</body>
</html>
